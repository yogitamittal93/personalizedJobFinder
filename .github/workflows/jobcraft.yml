name: JobCraft AI Autonomous Pipeline

on:
  schedule:
    # 1. Scraping crawler runs every 8 hours (00:00, 08:00, 16:00 UTC)
    - cron: '0 */8 * * *'
    # 2. Newsletter summary runs daily at 04:30 UTC (10:00 AM IST)
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual trigger directly from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows committing database and resumes back to Git

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pypdf langchain-google-genai python-dotenv playwright
        python -m playwright install chromium

    - name: Set environment variables
      run: |
        echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> .env
        echo "EMAIL_APP_PASSWORD=${{ secrets.EMAIL_APP_PASSWORD }}" >> .env
        echo "EMAIL_APP_PASSWORD2=${{ secrets.EMAIL_APP_PASSWORD2 }}" >> .env

    - name: Run Scraping Crawler
      # Run crawler if it's a manual trigger or the 8-hour cron
      if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '0 */8 * * *')
      run: |
        python jobcraft.py --cron-check

    - name: Run Daily Newsletter Email
      # Run newsletter if it's a manual trigger or the 10:00 AM cron
      if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '30 4 * * *')
      run: |
        python jobcraft.py --cron-summary

    - name: Commit and Push Database & Resumes
      # Automatically sync database and tailored LaTeX resumes back to your repo
      run: |
        git config --global user.name "JobCraft AI Bot"
        git config --global user.email "jobcraft-agent@github.com"
        git add job_tracker.db candidate_profile.json tailored_resumes/ company_briefs/ || true
        git commit -m "🤖 Auto-sync pipeline tracking: scouted roles & tailored resumes [skip ci]" || exit 0
        git push
